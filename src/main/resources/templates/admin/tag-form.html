<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tag.id} != null ? '编辑标签' : '新增标签'">标签表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5" style="max-width: 600px;">
<h2 th:text="${tag.id} != null ? '编辑标签' : '新增标签'"></h2>
<form th:action="@{/admin/tags/save}" th:object="${tag}" method="post">
    <input type="hidden" th:field="*{id}" />
    <div class="mb-3">
        <label class="form-label">标签名称</label>
        <input type="text" th:field="*{name}" class="form-control" required />
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="/admin/tags" class="btn btn-secondary">取消</a>
</form>
</body>
</html>
