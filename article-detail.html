<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${article.title}">文章详情</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* 基础重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* body 背景图片（降级） */
    body {
      position: relative;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: url('/images/login-bg.png') no-repeat center center fixed;
      background-size: cover;
    }

    /* 毛玻璃伪元素：模糊的背景图 */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('/images/login-bg.png') no-repeat center center fixed;
      background-size: cover;
      filter: blur(12px);
      z-index: -1;
    }

    /* 文章内容容器（半透明白色，不模糊） */
    .article-container {
      max-width: 800px;
      margin: 2rem auto;
      background-color: rgba(255, 255, 255, 0.85);
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .cover-img {
      max-width: 100%;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }

    .tags span {
      margin-right: 0.5rem;
    }

    h1 {
      color: #0f172a;
      font-weight: 700;
    }

    .article-content {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #1e293b;
    }

    .btn {
      border-radius: 30px;
    }
  </style>
</head>
<body>

<div class="article-container">
  <h1 th:text="${article.title}">标题</h1>
  <div class="text-muted mb-3">
    作者：<span th:text="${article.author}"></span> |
    发布时间：<span th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd HH:mm')}"></span>
  </div>

  <div th:if="${article.coverImage != null}" class="text-center">
    <img th:src="${article.coverImage}" class="cover-img" alt="封面">
  </div>

  <div class="tags mb-3">
    <span th:each="tag : ${article.tags}" class="badge bg-secondary me-1" th:text="${tag.name}"></span>
  </div>

  <div class="article-content" th:utext="${article.content}">正文内容</div>

  <hr>
  <div class="d-flex justify-content-between mt-4">
    <a href="/" class="btn btn-secondary">返回首页</a>
    <a th:href="'/article/edit/' + ${article.id}" class="btn btn-primary">编辑文章</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
