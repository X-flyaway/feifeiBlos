<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>标签管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>标签管理</h1>
  <a href="/admin/tags/new" class="btn btn-primary">新增标签</a>
</div>
<table class="table table-bordered table-hover">
  <thead>
  <tr><th>ID</th><th>标签名称</th><th>操作</th></tr>
  </thead>
  <tbody>
  <tr th:each="tag : ${tags}">
    <td th:text="${tag.id}">...</td>
    <td th:text="${tag.name}">...</td>
    <td>
      <a th:href="'/admin/tags/edit/' + ${tag.id}" class="btn btn-sm btn-warning">编辑</a>
      <a th:href="'/admin/tags/delete/' + ${tag.id}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除吗？')">删除</a>
    </td>
  </tr>
  </tbody>
</table>
<a href="/" class="btn btn-secondary">返回首页</a>
</body>
</html>
