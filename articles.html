<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>文章管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
        body { background: #f0f2f5; }
        .container { margin-top: 2rem; }
        .status-badge { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
    </style>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>文章管理</h1>
    <a href="/article/new" class="btn btn-success">+ 写新文章</a>
  </div>

  <!-- 搜索框 -->
  <form method="get" class="mb-4">
    <div class="input-group">
      <input type="text" name="keyword" class="form-control" placeholder="搜索标题或内容" th:value="${keyword}">
      <button class="btn btn-primary" type="submit">搜索</button>
      <a href="/admin/articles" class="btn btn-outline-secondary">重置</a>
    </div>
  </form>

  <!-- 文章列表 -->
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
      <thead>
      <tr>
        <th>ID</th><th>标题</th><th>作者</th><th>状态</th><th>发布时间</th><th>操作</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="article : ${articles}">
        <td th:text="${article.id}">...</td>
        <td><a th:href="'/article/' + ${article.id}" target="_blank" th:text="${article.title}">标题</a></td>
        <td th:text="${article.author}">...</td>
        <td>
          <span th:if="${article.status == 'PUBLISHED'}" class="badge bg-success status-badge">已发布</span>
          <span th:if="${article.status == 'DRAFT'}" class="badge bg-secondary status-badge">草稿</span>
        </td>
        <td th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd HH:mm')}">...</td>
        <td>
          <a th:href="'/article/edit/' + ${article.id}" class="btn btn-sm btn-primary">编辑</a>
          <a th:href="'/admin/articles/toggle-status/' + ${article.id}" class="btn btn-sm btn-warning">
            <span th:if="${article.status == 'PUBLISHED'}">撤回</span>
            <span th:unless="${article.status == 'PUBLISHED'}">发布</span>
          </a>
          <a th:href="'/admin/articles/delete/' + ${article.id}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除？')">删除</a>
        </td>
      </tr>
      <tr th:if="${articles.empty}">
        <td colspan="6" class="text-center">暂无文章</td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- 分页 -->
  <nav th:if="${totalPages > 0}">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
        <a class="page-link" th:href="@{/admin/articles(page=${currentPage-1}, size=10, keyword=${keyword})}">上一页</a>
      </li>
      <li class="page-item disabled"><span class="page-link">第 <span th:text="${currentPage+1}"/> / <span th:text="${totalPages}"/> 页</span></li>
      <li class="page-item" th:classappend="${currentPage+1 >= totalPages} ? 'disabled' : ''">
        <a class="page-link" th:href="@{/admin/articles(page=${currentPage+1}, size=10, keyword=${keyword})}">下一页</a>
      </li>
    </ul>
  </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
